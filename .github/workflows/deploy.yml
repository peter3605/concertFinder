name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  id-token: write # required for OIDC federation to AWS
  contents: read

env:
  AWS_REGION: us-east-1

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      - name: Go test
        run: go test ./...

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Frontend install
        run: npm --prefix web ci
      - name: Frontend typecheck
        run: npm --prefix web run lint

  deploy:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy via SSM
        id: ssm
        run: |
          set -euo pipefail
          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "${{ secrets.EC2_INSTANCE_ID }}" \
            --document-name AWS-RunShellScript \
            --comment "Deploy from GitHub Actions run ${{ github.run_id }}" \
            --parameters commands='[
              "set -euo pipefail",
              "cd /opt/concertfinder",
              "sudo -u concertfinder git fetch --all",
              "sudo -u concertfinder git reset --hard origin/main",
              "sudo -u concertfinder docker compose -f docker-compose.prod.yml pull || true",
              "sudo -u concertfinder docker compose -f docker-compose.prod.yml up -d --build"
            ]' \
            --query 'Command.CommandId' \
            --output text)
          echo "command_id=$COMMAND_ID" >> "$GITHUB_OUTPUT"
          echo "Started SSM command $COMMAND_ID"

      - name: Wait for deploy to finish
        run: |
          set -euo pipefail
          aws ssm wait command-executed \
            --command-id "${{ steps.ssm.outputs.command_id }}" \
            --instance-id "${{ secrets.EC2_INSTANCE_ID }}"

      - name: Print deploy output
        if: always()
        run: |
          aws ssm get-command-invocation \
            --command-id "${{ steps.ssm.outputs.command_id }}" \
            --instance-id "${{ secrets.EC2_INSTANCE_ID }}" \
            --query '{status:Status, stdout:StandardOutputContent, stderr:StandardErrorContent}' \
            --output json
