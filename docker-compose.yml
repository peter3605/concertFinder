services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: concertfinder
      POSTGRES_PASSWORD: concertfinder
      POSTGRES_DB: concertfinder
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U concertfinder -d concertfinder"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - path: .env
        required: false
    environment:
      DATABASE_URL: postgres://concertfinder:concertfinder@db:5432/concertfinder?sslmode=disable
      LISTEN_ADDR: ":8080"
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy

  web:
    build:
      context: ./web
      dockerfile: Dockerfile.dev
    volumes:
      - ./web:/app
      - web_node_modules:/app/node_modules
    ports:
      - "3000:3000"
    depends_on:
      - api

volumes:
  pgdata:
  web_node_modules:
